# HC-051: Run the PHPStan + PHPUnit gate on every push to main and
# every pull request. Tests run against in-memory SQLite (per
# tests/Integration/DatabaseTestCase) so no MySQL service is needed.

name: tests

on:
  push:
    branches: [main]
  pull_request:

# Cancel a previous run on the same branch when a new push lands. The
# CI gate is fast (~60s); only the latest commit's result matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHPStan max + PHPUnit
    strategy:
      matrix:
        php-version: [8.2, 8.3, 8.4]
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.php-version != '8.2' }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          # mysqli is needed because DbiAdapter / IntakeRepository import
          # the mysqli class even though the test path uses SQLite.
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, mysqli, zip
          coverage: ${{ matrix.php-version == '8.2' && 'pcov' || 'none' }}
          tools: composer:v2

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php82-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php82-composer-

      - name: Install dependencies (with dev tools — phpunit, phpstan)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: 'PHPStan (level: max)'
        run: composer analyse

      - name: PHPUnit (full suite)
        if: matrix.php-version != '8.2'
        run: composer test

      - name: PHPUnit + coverage (8.2 only)
        if: matrix.php-version == '8.2'
        run: composer test:coverage

      - name: Check coverage threshold
        if: matrix.php-version == '8.2'
        run: composer test:cov-check

      - name: Upload coverage artifact (8.2 only)
        if: matrix.php-version == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage/
            coverage.txt

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.2'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
