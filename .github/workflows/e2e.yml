# HC-078: End-to-end browser tests with Playwright against a live
# Docker Compose stack. Builds the web image locally rather than
# pulling a prebuilt one from a registry — keeps CI self-contained.

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build and start Docker Compose stack
        run: |
          docker compose up -d --build
          echo "Waiting for web to become healthy..."
          for i in {1..60}; do
            if curl -sf http://localhost:8080/ -o /dev/null; then
              echo "Web is up (attempt $i)"
              break
            fi
            sleep 2
          done
          docker compose ps

      - name: Seed admin user
        run: |
          docker compose exec -T db sh -c \
            'mysql -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE"' \
            < migrations/004_seed_admin_user.sql || echo "(seed already applied)"

      - name: Seed E2E fixtures
        run: docker compose exec -T web php bin/seed_e2e_fixtures.php

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Dump web container logs on failure
        if: failure()
        run: docker compose logs web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
